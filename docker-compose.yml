services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: notifier
      POSTGRES_PASSWORD: notifier
      POSTGRES_DB: notifier
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notifier -d notifier"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://notifier:notifier@postgres:5432/notifier
      APP_BASE_URL: http://localhost:3000
      SMTP_FROM: noreply@releases.app
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
