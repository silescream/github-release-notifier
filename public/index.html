<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Release Notifier</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f8fa;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border: 1px solid #d0d7de;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 440px;
    }

    .logo {
      width: 40px;
      height: 40px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 14px;
      color: #57606a;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #1a1a1a;
    }

    input {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      font-size: 14px;
      color: #1a1a1a;
      background: #fff;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,0.1); }
    input::placeholder { color: #8c959f; }

    button {
      width: 100%;
      padding: 9px 16px;
      background: #1a7f37;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover { background: #166a2e; }
    button:disabled { background: #8c959f; cursor: not-allowed; }

    .message {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      border-radius: 6px;
      font-size: 13px;
      line-height: 1.5;
    }

    .message.success {
      background: #dafbe1;
      border: 1px solid #aceebb;
      color: #116329;
    }

    .message.error {
      background: #fff0f0;
      border: 1px solid #ffcdd2;
      color: #a40000;
    }

    .success-view {
      display: none;
      text-align: center;
      padding: 16px 0;
    }

    .success-icon {
      font-size: 40px;
      margin-bottom: 16px;
    }

    .success-view h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .success-view p {
      font-size: 14px;
      color: #57606a;
      line-height: 1.5;
    }

    .success-view .email-hint {
      font-weight: 500;
      color: #1a1a1a;
    }

    .back-link {
      display: inline-block;
      margin-top: 20px;
      font-size: 13px;
      color: #0969da;
      cursor: pointer;
      background: none;
      border: none;
      text-decoration: underline;
      width: auto;
      padding: 0;
    }

    .back-link:hover { background: none; color: #0550ae; }
  </style>
</head>
<body>
  <div class="card">

    <div id="form-view">
      <svg class="logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.008-.866-.013-1.7-2.782.603-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.831.092-.646.35-1.086.636-1.336-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0112 6.836a9.59 9.59 0 012.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z" fill="#1a1a1a"/>
      </svg>

      <h1>GitHub Release Notifier</h1>
      <p class="subtitle">Subscribe to email notifications when a GitHub repository publishes a new release.</p>

      <form id="subscribe-form" novalidate>
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required>

        <label for="repo">GitHub repository</label>
        <input type="text" id="repo" placeholder="facebook/react" autocomplete="off" required>

        <button type="submit" id="submit-btn">Subscribe</button>
      </form>

      <div class="message" id="message"></div>
    </div>

    <div class="success-view" id="success-view">
      <div class="success-icon">&#9993;</div>
      <h2>Check your inbox</h2>
      <p>A confirmation link has been sent to<br><span class="email-hint" id="confirmed-email"></span></p>
      <p style="margin-top: 10px;">Click the link in the email to activate your subscription.</p>
      <button class="back-link" onclick="resetForm()">Subscribe to another repository</button>
    </div>

  </div>

  <script>
    const form = document.getElementById('subscribe-form');
    const submitBtn = document.getElementById('submit-btn');
    const messageEl = document.getElementById('message');
    const formView = document.getElementById('form-view');
    const successView = document.getElementById('success-view');
    const confirmedEmail = document.getElementById('confirmed-email');

    const ERROR_MESSAGES = {
      INVALID_EMAIL: 'Please enter a valid email address.',
      INVALID_REPO: 'Repository must be in owner/repo format (e.g. facebook/react).',
      REPO_NOT_FOUND: 'Repository not found on GitHub. Please check the name and try again.',
      ALREADY_EXISTS: 'This email is already subscribed to that repository.',
      EMAIL_ERROR: 'Failed to send confirmation email. Please try again later.',
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideMessage();

      const email = document.getElementById('email').value.trim();
      const repo = document.getElementById('repo').value.trim();

      submitBtn.disabled = true;
      submitBtn.textContent = 'Subscribing...';

      try {
        const response = await fetch('/api/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, repo }),
        });

        const data = await response.json();

        if (response.ok) {
          confirmedEmail.textContent = email;
          formView.style.display = 'none';
          successView.style.display = 'block';
          return;
        }

        const code = data.code;
        const text = ERROR_MESSAGES[code] || data.error || 'Something went wrong. Please try again.';
        showMessage(text, 'error');

      } catch {
        showMessage('Network error. Please check your connection and try again.', 'error');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Subscribe';
      }
    });

    function showMessage(text, type) {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
      messageEl.style.display = 'block';
    }

    function hideMessage() {
      messageEl.style.display = 'none';
    }

    function resetForm() {
      form.reset();
      hideMessage();
      successView.style.display = 'none';
      formView.style.display = 'block';
    }
  </script>
</body>
</html>
